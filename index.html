
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Metatags de SEO e Social (Gera o Logo ao compartilhar) -->
    <meta name="description" content="Casillas - Formulário Técnico Profissional para Usinagem e Manutenção Industrial" />
    <meta property="og:title" content="Casillas – Formulário Técnico" />
    <meta property="og:description" content="Cálculos de precisão, tabelas ISO e consultoria técnica em um só lugar." />
    <meta property="og:image" content="/logo_casillas.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://casillas-app.vercel.app" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/public/manifest.webmanifest" />

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Casillas" />
    <link rel="apple-touch-icon" href="/logo_casillas.png" />
    
    <title>Casillas - Formulário Técnico</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" />
    
    <style>
      :root { --app-height: 100%; }
      html, body {
        height: 100%;
        height: 100dvh;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #0a0908;
        font-family: 'Space Grotesk', sans-serif;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        touch-action: manipulation;
      }
      #root { height: 100%; height: 100dvh; width: 100%; }
      
      /* Splash screen industrial */
      #pwa-loader {
        position: fixed;
        inset: 0;
        background: #0a0908;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.4s ease;
      }
      .loader-spin {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(234,179,8,0.1);
        border-top: 4px solid #eab308;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      
      /* Custom Scrollbar */
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1412; border-radius: 10px; }
      
      .bg-rust-dark {
        background: linear-gradient(180deg, #0a0908 0%, #1a1412 100%);
      }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
